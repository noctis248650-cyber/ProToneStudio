name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        id: required
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, or OPENAI_API_KEY is missing. Skipping Supabase function deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Sync Supabase secrets
        if: steps.required.outputs.skip != 'true'
        run: |
          npx supabase@latest secrets set \
            OPENAI_API_KEY="$OPENAI_API_KEY" \
            OPENAI_MODEL="${OPENAI_MODEL:-gpt-4.1-mini}" \
            ALLOWED_ORIGINS="${ALLOWED_ORIGINS:-https://noctis248650-cyber.github.io,http://localhost:5174,http://127.0.0.1:5174}" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy smart-adjust function
        if: steps.required.outputs.skip != 'true'
        run: |
          npx supabase@latest functions deploy smart-adjust --project-ref "$SUPABASE_PROJECT_REF"
