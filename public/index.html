<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111318" />
    <title>ProTone Studio Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <img src="./HH%20STUDIO.png" alt="HH STUDIO" />
        </div>
        <nav class="primary-actions" aria-label="주요 작업">
          <button class="action-button batch-action" id="batchButton" type="button" title="첨부한 모든 이미지 일괄 보정">전체 보정</button>
          <button class="action-button" id="saveButton" type="button">현재 저장</button>
          <button class="action-button" id="saveAllButton" type="button">전체 저장</button>
        </nav>
      </header>

      <main class="layout">
        <section class="workspace-card preview-card">
          <div class="preview-toolbar">
            <span class="scene-title" id="sceneTitle">이미지를 올려주세요</span>
          </div>

          <div class="canvas-stage" id="dropZone">
            <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif" aria-label="사진 선택" multiple hidden />
            <canvas id="previewCanvas"></canvas>
            <div class="compare-labels hidden" id="compareLabels">
              <button id="beforeButton" type="button">◁ BEFORE</button>
              <button id="afterButton" type="button">AFTER ▷</button>
            </div>
            <button class="compare-handle hidden" id="compareHandle" type="button" aria-label="비포 애프터 비교선 이동">
              <span>‹</span><span>›</span>
            </button>
            <div class="loading-overlay hidden" id="loadingOverlay" aria-live="polite">
              <span class="loading-spinner"></span>
              <strong>LOADING</strong>
            </div>
            <div class="empty-state" id="emptyState">
              <strong>이미지를 올려주세요</strong>
              <span>드래그 앤 드롭 또는 클릭</span>
            </div>
          </div>

          <div class="canvas-tools" aria-label="이미지 도구">
            <button class="tool-button icon-tool" id="rotateButton" type="button" aria-label="이미지 회전" title="이미지 회전">↶</button>
            <button class="tool-button icon-tool zoom-tool" id="zoomOutButton" type="button" aria-label="이미지 축소" title="이미지 축소">-</button>
            <button class="tool-button zoom-reset-tool" id="zoomResetButton" type="button" aria-label="확대 초기화" title="확대 초기화">1x</button>
            <button class="tool-button icon-tool zoom-tool" id="zoomInButton" type="button" aria-label="이미지 확대" title="이미지 확대">+</button>
            <button class="tool-button icon-tool face-retouch-button" id="faceRetouchButton" type="button" aria-label="얼굴 보정" title="얼굴 보정" disabled>☺</button>
          </div>

          <div class="thumbnail-panel">
            <div class="thumbnail-header">
              <span class="eyebrow">IMAGES</span>
              <span id="imageCount">0</span>
            </div>
            <div class="file-list" id="fileList"></div>
          </div>
        </section>

        <aside class="workspace-card controls-card">
          <details open>
            <summary>스마트 보정</summary>
            <div class="section-body">
              <label class="field">
                <span>스타일</span>
                <select id="styleSelect">
                  <option value="auto">AI 추천</option>
                  <option value="natural">자연스럽게</option>
                  <option value="bright">밝고 깨끗하게</option>
                  <option value="vivid">선명하게</option>
                  <option value="soft">부드럽게</option>
                  <option value="warm">따뜻하게</option>
                  <option value="cool">차갑게</option>
                  <option value="instagram">인스타 감성</option>
                  <option value="cafe">카페 감성</option>
                  <option value="travel">여행 사진</option>
                  <option value="cinematic">시네마틱</option>
                  <option value="film">필름 감성</option>
                  <option value="moody">무드 있게</option>
                  <option value="portrait">인물/셀카</option>
                  <option value="product">제품 사진</option>
                  <option value="food">음식 사진</option>
                  <option value="space">공간/부동산</option>
                  <option value="night">야간 사진</option>
                  <option value="mono">흑백</option>
                </select>
              </label>
              <p class="smart-summary" id="smartSummary">스마트 보정 대기</p>
            </div>
          </details>

          <details>
            <summary>세부 설정값</summary>
            <div class="detail-grid" id="detailGrid"></div>
          </details>
        </aside>

      </main>
    </div>

    <script src="./protone-config.js"></script>
    <script src="./app.js"></script>
    <script src="./face-retouch.js"></script>
  </body>
</html>
